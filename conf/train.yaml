defaults:
  - trainer: default
  - hydra: default
  - wandb: disabled # set to enabled for wandb logging
  - resume_training: disabled # by default, it starts training from scratch
  - optimizer: schedulefree_adamw
  - _self_
  - model: tabdpt_long_context
  - override hydra/hydra_logging: none # hack to fix the logging code
  - override hydra/job_logging: none # hack to fix the logging code

seed: 1234
out_dir: output
default_device: cuda:0

# for better dataloading parallelism
prefetch_factor: 4
num_workers: 32

vmin: -5.0
vmax: 5.0
sigma: 0.5
query_strategy: both # random, event, both, or both_fix_len
time_transform: lognormal # quantile or lognormal
